<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOMI Operations Portal</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #17202a;
      --muted: #667085;
      --line: #e6ebf2;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    body.dark {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #e5ecf6;
      --muted: #94a3b8;
      --line: #233044;
      --primary: #60a5fa;
      --primary-soft: rgba(96, 165, 250, 0.16);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 16px 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 6px;
      flex: 0 0 auto;
    }
    .brand-text {
      min-width: 0;
    }
    .brand-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
    }
    .brand-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 18px;
      margin-bottom: 20px;
    }
    .card, .tool-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card { padding: 24px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .hero-actions, .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn, .chip, .icon-btn, input, select {
      font: inherit;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-soft {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .stat .k { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .stat .v { font-size: 28px; font-weight: 800; }
    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr auto auto;
      gap: 12px;
      margin-bottom: 14px;
    }
    .field input, .field select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 0 14px;
      outline: none;
    }
    .icon-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
    }
    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0 12px;
    }
    .section-title { font-size: 20px; font-weight: 800; margin: 0; }
    .section-meta { color: var(--muted); font-size: 13px; }
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .tool-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }
    .tool-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .icon {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--primary-soft);
      font-size: 24px;
    }
    .fav-btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      padding: 0;
    }
    .tool-title { margin: 0 0 6px; font-size: 20px; font-weight: 800; }
    .tool-desc {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.55;
      margin-bottom: 14px;
      min-height: 64px;
      white-space: pre-line;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
    }
    .badge.category {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }
    .tool-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .updated { color: var(--muted); font-size: 12px; }
    .empty {
      display: none;
      padding: 26px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      background: var(--panel);
    }
    .footer {
      color: var(--muted);
      text-align: center;
      padding: 24px 0 8px;
      font-size: 13px;
    }
    code {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px 6px;
    }
    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr 1fr auto auto; }
      .tool-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .wrap { padding: 14px; }
      h1 { font-size: 26px; }
      .topbar {
        padding: 14px;
      }
      .brand-title {
        font-size: 20px;
      }
      .brand-logo {
        width: 46px;
        height: 46px;
      }
      .controls { grid-template-columns: 1fr; }
      .tool-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .tool-card { min-height: unset; }
      .tool-desc { min-height: unset; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <img src="SK_LOGO.png" alt="SK Aviation logo" class="brand-logo" />
        <div class="brand-text">
          <h1 class="brand-title">SK-Aviation Programs</h1>
        </div>
      </div>
      <button class="icon-btn" id="themeToggle" title="테마 변경">🌙</button>
    </div>

    <section>
      <div class="controls">
        <div class="field"><input type="text" id="searchInput" placeholder="프로그램 이름, 설명, 태그 검색" /></div>
        <div class="field">
          <select id="categorySelect">
            <option value="all">All Categories</option>
          </select>
        </div>
      </div>
      <div class="chips" id="categoryChips"></div>
    </section>

    <section>
      <div class="section-head">
        <h2 class="section-title">My Programs</h2>
        <div class="section-meta" id="resultMeta">0 programs</div>
      </div>
      <div class="tool-grid" id="toolGrid"></div>
      <div class="empty" id="emptyState">조건에 맞는 프로그램이 없습니다.</div>
    </section>
  </div>

  <script>
    const FAA_CODE_API_URL = 'https://script.google.com/macros/s/AKfycbyKA1tC1eLNc_yRwduGAtRnggd81GlUuvf_TdrB4bWn3LAA_C_DAV2o1V1nCzTSt1j5/exec';

    const tools = [
      {
        id: 'currency-checker',
        name: 'Currency Checker',
        description: '승무원 및 운항 관련 currency 상태 조회.',
        category: 'Crew',
        icon: '✅',
        tags: ['currency', 'crew', 'status'],
        updated: '2026-04-15',
        order: 1,
        url: 'https://bomi87.github.io/Currency/'
      },
      {
        id: 'fbo-search',
        name: 'FBO Search',
        description: '공항별 FBO 및 연락처 조회.',
        category: 'Airport',
        icon: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.11.37 2.3.56 3.58.56a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.07 21 3 13.93 3 5a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.28.19 2.47.56 3.58a1 1 0 0 1-.24 1.01l-2.2 2.2Z" fill="#ec4899"/></svg>',
        tags: ['FBO', 'airport', 'ops'],
        updated: '2026-04-15',
        order: 2,
        url: 'https://bomi87.github.io/FBO/'
      },
      {
        id: 'factsheet',
        name: 'FACT Sheet',
        description: '공항별 FACT Sheet PDF 조회.',
        category: 'Airport',
        icon: '📄',
        tags: ['factsheet', 'airport', 'pdf'],
        updated: '2026-04-15',
        order: 3,
        url: 'https://bomi87.github.io/FACTSHEET/'
      },
      {
        id: 'past-wx',
        name: 'Historical WX',
        description: '시간대별 공항 과거 기상 조회 및 분석.',
        category: 'Airport',
        icon: '🌦️',
        tags: ['pastwx', 'weather', 'airport', 'history'],
        updated: '2026-04-15',
        order: 4,
        url: 'https://bomi87.github.io/Past_WX/'
      },
      {
        id: 'faa-nas-status',
        name: 'FAA NAS Status',
        description: 'FAA National Airspace System status overview.',
        category: 'Airport',
        icon: '🚦',
        tags: ['faa', 'nas', 'status', 'delay'],
        updated: '2026-04-15',
        order: 5,
        url: 'https://nasstatus.faa.gov/'
      },
      {
        id: 'faa-airport-status',
        name: 'FAA Airport Status',
        description: 'ICAO 또는 IATA 공항코드를 입력하면 FAA 공항 상태 페이지 오픈.\n(4 LETTER 입력 시 3 LETTER 자동 변환)',
        category: 'Airport',
        icon: '🗺️',
        tags: ['faa', 'airport', 'status', 'delay', 'iata', 'icao'],
        updated: '2026-04-15',
        order: 6,
        action: 'faa-airport-status'
      },
      {
        id: 'hl8080-route',
        name: 'HL8080 Route',
        description: 'HL8080 항공기 Route 및 Tracking.\n(Waypoint detail Click & NDB 버튼 on/off 설정 가능)',
        category: 'Tracking',
        icon: '🛫',
        tags: ['HL8080', 'route', 'tracking'],
        updated: '2026-04-15',
        order: 7,
        url: 'https://bomi87.github.io/FLIGHT_MAP/?file=live/HL8080.kml&hexs=71C080,71C372,71C550,71C290,71C299,71BA27,71C508,71C230,71C068,71C222,ad45a4'
      },
      {
        id: 'hl8372-route',
        name: 'HL8372 Route',
        description: 'HL8372 항공기 Route 및 Tracking.\n(Waypoint detail Click & NDB 버튼 on/off 설정 가능)',
        category: 'Tracking',
        icon: '🛫',
        tags: ['HL8372', 'route', 'tracking'],
        updated: '2026-04-15',
        order: 8,
        url: 'https://bomi87.github.io/FLIGHT_MAP/?file=live/HL8372.kml&hexs=71C080,71C372,71C550,71C290,71C299,71BA27,71C508,71C230,71C068,71C222,ad45a4'
      },
      {
        id: 'hospital-search',
        name: 'Hospital Search',
        description: '공항 주변 병원 조회.\n(대학병원, 종합병원 우선 조회)',
        category: 'Medical',
        icon: '🏥',
        tags: ['hospital', 'medical', 'search'],
        updated: '2026-04-15',
        order: 9,
        url: 'https://bomi87.github.io/Hospital/'
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const categoryChips = document.getElementById('categoryChips');
    const toolGrid = document.getElementById('toolGrid');
    const emptyState = document.getElementById('emptyState');
    const resultMeta = document.getElementById('resultMeta');
    const themeToggle = document.getElementById('themeToggle');

    const FAVORITE_KEY = 'toolPortalFavorites';
    const THEME_KEY = 'toolPortalTheme';

    let favorites = loadFavorites();
    let activeCategory = 'all';
    let favoritesOnly = false;

    function loadFavorites() {
      try { return JSON.parse(localStorage.getItem(FAVORITE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveFavorites() {
      localStorage.setItem(FAVORITE_KEY, JSON.stringify(favorites));
    }

    function toggleFavorite(id) {
      if (favorites.includes(id)) favorites = favorites.filter(v => v !== id);
      else favorites.push(id);
      saveFavorites();
      updateStats();
      renderTools();
    }

    function setTheme(theme) {
      document.body.classList.toggle('dark', theme === 'dark');
      localStorage.setItem(THEME_KEY, theme);
      themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    function initTheme() {
      setTheme(localStorage.getItem(THEME_KEY) || 'light');
    }

    function categories() {
      const preferredOrder = ['Crew', 'Airport', 'Tracking', 'Medical'];
      const existing = [...new Set(tools.map(t => t.category))];
      return preferredOrder.filter(cat => existing.includes(cat));
    }

    function populateCategoryControls() {
      const cats = categories();
      categorySelect.innerHTML = '<option value="all">All</option>' +
        cats.map(cat => `<option value="${cat}">${cat}</option>`).join('');

      categoryChips.innerHTML = [
        '<button class="chip active" data-category="all">All</button>',
        ...cats.map(cat => `<button class="chip" data-category="${cat}">${cat}</button>`)
      ].join('');

      categoryChips.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          activeCategory = chip.dataset.category;
          categorySelect.value = activeCategory;
          updateActiveChips();
          renderTools();
        });
      });
    }

    function updateActiveChips() {
      categoryChips.querySelectorAll('.chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.category === activeCategory);
      });
    }

    function filteredTools() {
      const q = searchInput.value.trim().toLowerCase();
      return tools.filter(tool => {
        const matchCategory = activeCategory === 'all' || tool.category === activeCategory;
        const matchSearch = !q || [tool.name, tool.description, tool.category, ...(tool.tags || [])]
          .join(' ').toLowerCase().includes(q);
        const matchFavorites = !favoritesOnly || favorites.includes(tool.id);
        return matchCategory && matchSearch && matchFavorites;
      });
    }

    function renderTools() {
      const items = filteredTools();
      const sorted = [...items].sort((a, b) => {
        const af = favorites.includes(a.id) ? 1 : 0;
        const bf = favorites.includes(b.id) ? 1 : 0;
        return bf - af || (a.order || 999) - (b.order || 999) || a.name.localeCompare(b.name);
      });

      toolGrid.innerHTML = sorted.map(tool => {
        const isFav = favorites.includes(tool.id);
        return `
          <article class="tool-card">
            <div class="tool-top">
              <div class="icon">${tool.icon || '🧩'}</div>
              <button class="fav-btn" onclick="toggleFavorite('${tool.id}')" title="즐겨찾기">${isFav ? '⭐' : '☆'}</button>
            </div>
            <div>
              <h3 class="tool-title">${tool.name}</h3>
              <div class="tool-desc">${tool.description}</div>
              <div class="badges">
                <span class="badge category">${tool.category}</span>
                ${(tool.tags || []).map(tag => `<span class="badge">#${tag}</span>`).join('')}
              </div>
            </div>
            <div class="tool-footer">
              <a class="btn btn-primary" href="#" onclick="openTool(event, '${tool.id}')" target="_blank" rel="noopener noreferrer">Open</a>
            </div>
          </article>
        `;
      }).join('');

      emptyState.style.display = sorted.length ? 'none' : 'block';
      resultMeta.textContent = `${sorted.length} items`;
    }

    function updateStats() {
    }

    async function getFaaAirportStatusUrl(inputCode) {
      const code = String(inputCode || '').trim().toUpperCase();

      if (!code) {
        throw new Error('공항코드가 비어있습니다.');
      }

      if (/^[A-Z]{3}$/.test(code)) {
        return `https://www.fly.faa.gov/fly/flyfaa/flyfaaindex?ARPT=${encodeURIComponent(code)}&p=1`;
      }

      if (!/^[A-Z]{4}$/.test(code)) {
        throw new Error('3 또는 4 LETTER 공항코드를 입력해줘.');
      }

      const res = await fetch(`${FAA_CODE_API_URL}?code=${encodeURIComponent(code)}`, {
        method: 'GET'
      });

      if (!res.ok) {
        throw new Error(`API 호출 실패 (${res.status})`);
      }

      const data = await res.json();

      if (!data.ok || !data.faaUrl) {
        throw new Error(data.error || '공항코드 변환 실패');
      }

      return data.faaUrl;
    }

    function askAirportCode() {
      return new Promise((resolve) => {
        const modal = document.getElementById('airportCodeModal');
        const input = document.getElementById('airportCodeInput');
        const okBtn = document.getElementById('airportCodeOk');
        const cancelBtn = document.getElementById('airportCodeCancel');

        function cleanup() {
          input.removeEventListener('keydown', onKeydown);
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          modal.removeEventListener('click', onBackdrop);
        }

        function close(value) {
          modal.style.display = 'none';
          input.value = '';
          cleanup();
          resolve(value);
        }

        function onOk() {
          close(input.value.trim().toUpperCase());
        }

        function onCancel() {
          close(null);
        }

        function onBackdrop(e) {
          if (e.target === modal) close(null);
        }

        function onKeydown(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            onOk();
          } else if (e.key === 'Escape') {
            e.preventDefault();
            onCancel();
          }
        }

        modal.style.display = 'flex';
        input.value = '';
        setTimeout(() => input.focus(), 0);

        input.addEventListener('keydown', onKeydown);
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        modal.addEventListener('click', onBackdrop);
      });
    }

    searchInput.addEventListener('input', renderTools);
    categorySelect.addEventListener('change', () => {
      activeCategory = categorySelect.value;
      updateActiveChips();
      renderTools();
    });

    themeToggle.addEventListener('click', () => {
      setTheme(document.body.classList.contains('dark') ? 'light' : 'dark');
    });

    populateCategoryControls();
    initTheme();
    updateStats();
    renderTools();

    window.toggleFavorite = toggleFavorite;

    async function openTool(event, toolId) {
      event.preventDefault();

      const tool = tools.find(t => t.id === toolId);
      if (!tool) return;

      try {
        if (tool.action === 'faa-airport-status') {
          const code = await askAirportCode();
          if (!code) return;

          const url = await getFaaAirportStatusUrl(code);
          window.open(url, '_blank', 'noopener,noreferrer');
          return;
        }

        if (tool.url) {
          window.open(tool.url, '_blank', 'noopener,noreferrer');
        }
      } catch (err) {
        console.error(err);
        alert(err.message || '실행 중 오류 발생.');
      }
    }

    window.openTool = openTool;
  </script>

  <div id="airportCodeModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:9999; align-items:center; justify-content:center; padding:16px;">
    <div style="width:100%; max-width:460px; background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:20px;">
      <div style="font-size:18px; font-weight:800; margin-bottom:10px;">FAA Airport Status</div>
      <div style="font-size:14px; color:var(--muted); line-height:1.5; margin-bottom:14px;">
        ICAO 또는 IATA 공항코드를 입력.<br>
        예: KEWR / EWR
      </div>
      <input
        id="airportCodeInput"
        type="text"
        maxlength="4"
        autocomplete="off"
        placeholder="예: KEWR"
        style="width:100%; height:48px; border:1px solid var(--line); background:var(--panel); color:var(--text); border-radius:12px; padding:0 14px; outline:none;"
      />
      <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:16px;">
        <button id="airportCodeCancel" class="btn btn-soft" type="button">취소</button>
        <button id="airportCodeOk" class="btn btn-primary" type="button">확인</button>
      </div>
    </div>
  </div>
</body>
</html>
