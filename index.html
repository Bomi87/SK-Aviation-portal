<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BOMI Operations Portal</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #17202a;
      --muted: #667085;
      --line: #e6ebf2;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    body.dark {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #e5ecf6;
      --muted: #94a3b8;
      --line: #233044;
      --primary: #60a5fa;
      --primary-soft: rgba(96, 165, 250, 0.16);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1220px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 16px 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand-logo {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 14px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 6px;
      flex: 0 0 auto;
    }
    .brand-text {
      min-width: 0;
    }
    .brand-title {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
    }
    .brand-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 18px;
      margin-bottom: 20px;
    }
    .card, .tool-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .card { padding: 24px; }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 32px;
      line-height: 1.2;
    }
    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    .hero-actions, .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn, .chip, .icon-btn, input, select {
      font: inherit;
    }

    /* 모바일 input 클릭 시 자동 Zoom-in 방지 */
    input,
    select,
    textarea,
    button {
      font-size: 16px !important;
    }

    #airportCodeInput {
      font-size: 16px !important;
      transform: translateZ(0);
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-soft {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .stat .k { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .stat .v { font-size: 28px; font-weight: 800; }
    .controls {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr auto auto;
      gap: 12px;
      margin-bottom: 14px;
    }
    .field input, .field select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      padding: 0 14px;
      outline: none;
    }
    .icon-btn {
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
    }
    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 18px 0 12px;
    }
    .section-title { font-size: 20px; font-weight: 800; margin: 0; }
    .section-meta { color: var(--muted); font-size: 13px; }
    .section-refresh-btn{
  width:36px;
  height:36px;
  border-radius:12px;
  font-size:16px;
  padding:0;
}
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }
    .tool-card {
      padding: 18px;
      display: flex;
      flex-direction: column;
      min-height: 240px;
    }
    .tool-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .icon {
      width: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: var(--primary-soft);
      font-size: 24px;
    }
    .fav-btn {
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
      padding: 0;
    }
    .tool-title { margin: 0 0 6px; font-size: 20px; font-weight: 800; }
    .tool-desc {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.55;
      margin-bottom: 14px;
      min-height: 64px;
      white-space: pre-line;
    }
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .badge {
      font-size: 12px;
      font-weight: 700;
      padding: 6px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
    }
    .badge.category {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: transparent;
    }
    .tool-footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .updated { color: var(--muted); font-size: 12px; }
    .empty {
      display: none;
      padding: 26px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      background: var(--panel);
    }
    .footer {
      color: var(--muted);
      text-align: center;
      padding: 24px 0 8px;
      font-size: 13px;
    }
    code {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 2px 6px;
    }

    .atis-result-body {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.55;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      max-height: 60vh;
      overflow: auto;
    }
    .atis-section-title {
      font-weight: 800;
      margin: 12px 0 6px;
      color: var(--primary);
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr 1fr auto auto; }
      .tool-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 680px) {
      .wrap { padding: 14px; }
      h1 { font-size: 26px; }
      .topbar {
        padding: 14px;
      }
      .brand-title {
        font-size: 20px;
      }
      .brand-logo {
        width: 46px;
        height: 46px;
      }
      .controls { grid-template-columns: 1fr; }
      .tool-grid { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .tool-card { min-height: unset; }
      .tool-desc { min-height: unset; }
    }
  </style>
</head>

function categories() {
  const preferredOrder = ['Crew', 'Airport', 'WX', 'Tracking', 'FAA', 'Medical'];
  const existing = [...new Set(tools.map(t => t.category))];
  return preferredOrder.filter(cat => existing.includes(cat));
}
    function populateCategoryControls() {
      const cats = categories();
      categorySelect.innerHTML = '<option value="all">All</option>' +
        cats.map(cat => `<option value="${cat}">${cat}</option>`).join('');

      categoryChips.innerHTML = [
        '<button class="chip active" data-category="all">All</button>',
        ...cats.map(cat => `<button class="chip" data-category="${cat}">${cat}</button>`)
      ].join('');

      categoryChips.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          activeCategory = chip.dataset.category;
          categorySelect.value = activeCategory;
          updateActiveChips();
          renderTools();
        });
      });
    }

    function updateActiveChips() {
      categoryChips.querySelectorAll('.chip').forEach(chip => {
        chip.classList.toggle('active', chip.dataset.category === activeCategory);
      });
    }

    function filteredTools() {
      const q = searchInput.value.trim().toLowerCase();
      return tools.filter(tool => {
        const matchCategory = activeCategory === 'all' || tool.category === activeCategory;
        const matchSearch = !q || [tool.name, tool.description, tool.category, ...(tool.tags || [])]
          .join(' ').toLowerCase().includes(q);
        const matchFavorites = !favoritesOnly || favorites.includes(tool.id);
        return matchCategory && matchSearch && matchFavorites;
      });
    }

    function renderTools() {
      const items = filteredTools();
      const sorted = [...items].sort((a, b) => {
        const af = favorites.includes(a.id) ? 1 : 0;
        const bf = favorites.includes(b.id) ? 1 : 0;
        return bf - af || (a.order || 999) - (b.order || 999) || a.name.localeCompare(b.name);
      });

      toolGrid.innerHTML = sorted.map(tool => {
        const isFav = favorites.includes(tool.id);
        return `
          <article class="tool-card">
            <div class="tool-top">
              <div class="icon">${tool.icon || '🧩'}</div>
              <button class="fav-btn" onclick="toggleFavorite('${tool.id}')" title="즐겨찾기">${isFav ? '⭐' : '☆'}</button>
            </div>

            </div>

        `;
      }).join('');

      emptyState.style.display = sorted.length ? 'none' : 'block';
      resultMeta.textContent = `${sorted.length} items`;
    }

    function getFaaAirportStatusUrl(inputCode) {
      const code = String(inputCode || '').trim().toUpperCase();

      if (!code) {
        throw new Error('공항코드가 비어있습니다.');
      }

      if (/^[A-Z]{3}$/.test(code)) {
        return `https://www.fly.faa.gov/fly/flyfaa/flyfaaindex?ARPT=${encodeURIComponent(code)}&p=1`;
      }

      if (/^[A-Z]{4}$/.test(code)) {
        const iata = ICAO_TO_IATA[code];
        if (!iata) {
          throw new Error('해당 4 LETTER 코드의 3 LETTER 매핑이 없습니다.');
        }
        return `https://www.fly.faa.gov/fly/flyfaa/flyfaaindex?ARPT=${encodeURIComponent(iata)}&p=1`;
      }

      throw new Error('3 또는 4 LETTER 공항코드를 입력해줘.');
    }
function getAwcMetarTafUrl(inputCode) {
  const raw = String(inputCode || '').toUpperCase().trim();

  if (!raw) {
    throw new Error('ICAO 코드를 입력해줘.');
  }

  const codes = raw
    .split(/[\s,]+/)
    .map(v => v.trim())
    .filter(Boolean);

  if (!codes.length) {
    throw new Error('유효한 ICAO 코드가 없습니다.');
  }

  const invalid = codes.filter(code => !/^[A-Z]{4}$/.test(code));
  if (invalid.length) {
   throw new Error('4 LETTER ICAO 코드만 입력. 예: RKSI');
  }

  return `https://aviationweather.gov/data/metar/?ids=${encodeURIComponent(codes.join(','))}&taf=1`;
}
function getAtisGuruUrl(inputCode) {
  const code = String(inputCode || '').trim().toUpperCase();

  if (!code) {
    throw new Error('ICAO 코드를 입력해줘.');
  }

  if (!/^[A-Z]{4}$/.test(code)) {
    throw new Error('4 LETTER ICAO 코드만 입력. 예: RKSI');
  }

  return `https://atis.guru/atis/${encodeURIComponent(code)}`;
}

function getAtisGuruDataUrl(inputCode) {
  const code = String(inputCode || '').trim().toUpperCase();

  if (!code) {
    throw new Error('ICAO 코드를 입력해줘.');
  }

  if (!/^[A-Z]{4}$/.test(code)) {
   throw new Error('4 LETTER ICAO 코드만 입력. 예: RKSI');
  }

  if (!ATIS_PROXY_URL || ATIS_PROXY_URL.includes('여기에_Apps_Script_Web_App_URL_입력')) {
    throw new Error('ATIS_PROXY_URL에 Apps Script Web App URL을 먼저 입력해야 해.');
  }

  return `${ATIS_PROXY_URL}?icao=${encodeURIComponent(code)}`;
}

async function fetchAtisGuruData(inputCode) {
  const url = getAtisGuruDataUrl(inputCode);
  const res = await fetch(url, { method: 'GET' });

  if (!res.ok) {
    throw new Error(`ATIS 데이터 조회 실패. HTTP ${res.status}`);
  }

  const data = await res.json();
  if (!data.ok) {
    throw new Error(data.error || 'ATIS 데이터 조회 실패.');
  }

  return data;
}

function showAtisResultModal(data) {
  const modal = document.getElementById('atisResultModal');
  const title = document.getElementById('atisResultTitle');
  const body = document.getElementById('atisResultBody');
  const closeBtn = document.getElementById('atisResultClose');

  title.textContent = `${data.icao || ''} ATIS`;

  const parts = [];

  // 1순위: 새 구조 atisBlocks 표시
  // ARR/DEP/COMBINED 강제분류 대신, Apps Script가 추출한 ATIS 블록을 그대로 표시
  if (Array.isArray(data.atisBlocks) && data.atisBlocks.length) {
    data.atisBlocks.forEach(block => {
      if (!block) return;

      const label = block.label || 'CURRENT ATIS';
      const time = block.time || '';
      const text = block.text || '';

      if (time || text) {
        parts.push(
          `${label}
${time}
${text}`.trim()
        );
      }
    });
  }

  // 2순위: 구버전 호환용 combined / arrival / departure
  // atisBlocks가 없을 때만 사용
  if (!Array.isArray(data.atisBlocks) || !data.atisBlocks.length) {
    if (data.combined && (data.combined.time || data.combined.text)) {
      parts.push(
        `COMBINED ARR/DEP ATIS
${data.combined.time || ''}
${data.combined.text || ''}`.trim()
      );
    }

    if (!data.combined || !data.combined.text) {
      if (data.arrival && (data.arrival.time || data.arrival.text)) {
        parts.push(
          `ARRIVAL ATIS
${data.arrival.time || ''}
${data.arrival.text || ''}`.trim()
        );
      }

      if (data.departure && (data.departure.time || data.departure.text)) {
        parts.push(
          `DEPARTURE ATIS
${data.departure.time || ''}
${data.departure.text || ''}`.trim()
        );
      }
    }
  }

  if (data.metar) {
    parts.push(`METAR\n${data.metar}`.trim());
  }

  if (data.taf) {
    parts.push(`TAF\n${data.taf}`.trim());
  }

  body.textContent = parts.length
    ? parts.join('\n\n------------------------------\n\n')
    : '표시할 ATIS 데이터가 없습니다.';

  function close() {
    modal.style.display = 'none';
    closeBtn.removeEventListener('click', close);
  }

  closeBtn.addEventListener('click', close);
  modal.style.display = 'flex';
}

function askAirportCode(title = 'Airport Code Input', desc = 'ICAO 또는 IATA 공항코드를 입력해줘.') {
  return new Promise((resolve) => {
    const modal = document.getElementById('airportCodeModal');
    const input = document.getElementById('airportCodeInput');
    const okBtn = document.getElementById('airportCodeOk');
    const cancelBtn = document.getElementById('airportCodeCancel');
    const titleEl = document.getElementById('airportCodeModalTitle');
    const descEl = document.getElementById('airportCodeModalDesc');

    function onInput() {
      input.value = input.value.toUpperCase();
    }

    function cleanup() {
      input.removeEventListener('input', onInput);
      input.removeEventListener('keydown', onKeydown);
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      modal.removeEventListener('click', onBackdrop);
    }

    function close(value) {
      modal.style.display = 'none';
      input.value = '';
      cleanup();
      resolve(value);
    }

    function onOk() {
      close(input.value.trim().toUpperCase());
    }

    function onCancel() {
      close(null);
    }

    function onBackdrop(e) {
      if (e.target === modal) close(null);
    }

    function onKeydown(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        onOk();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        onCancel();
      }
    }

    titleEl.textContent = title;
    descEl.textContent = desc;

    modal.style.display = 'flex';
    input.value = '';
    setTimeout(() => input.focus(), 0);

    input.addEventListener('input', onInput);
    input.addEventListener('keydown', onKeydown);
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    modal.addEventListener('click', onBackdrop);
  });
}

    searchInput.addEventListener('input', renderTools);

refreshBtn.addEventListener('click', () => {

function openExternalUrl(url) {
  const newWindow = window.open(url, '_blank');

  // 모바일/브라우저 팝업 차단 시 현재 창에서라도 열리게 처리
  if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
    window.location.href = url;
    return;
  }

  newWindow.opener = null;
}

   async function openTool(event, toolId) {
  event.preventDefault();

  const tool = tools.find(t => t.id === toolId);
  if (!tool) return;

  try {
   if (tool.action === 'faa-airport-status') {
  const code = await askAirportCode(
    'FAA Airport Status',
    'ICAO 또는 IATA 미국공항 코드 입력.'
  );
  if (!code) return;

  const url = getFaaAirportStatusUrl(code);
  openExternalUrl(url);
  return;
}

if (tool.action === 'atis-guru') {
  const code = await askAirportCode(
    'D-ATIS',
    'ICAO 4 LETTER 공항코드 입력. 예: RKSI'
  );
  if (!code) return;

  const data = await fetchAtisGuruData(code);
  showAtisResultModal(data);
  return;
}

if (tool.action === 'awc-metar-taf') {
  const code = await askAirportCode(
    'METAR & TAF',
    'ICAO 4 LETTER 공항코드 입력.(여러 공항 조회 가능)'
  );
  if (!code) return;

  const url = getAwcMetarTafUrl(code);
  openExternalUrl(url);
  return;
}
    if (tool.url) {
      openExternalUrl(tool.url);
    }
  } catch (err) {
    console.error(err);
    alert(err.message || '실행 중 오류 발생.');
  }
}
